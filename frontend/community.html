<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소통게시판 | DearZit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="landing.css">
    <link rel="stylesheet" href="community.css">
    <script src="config.js"></script>
    <script src="common.js"></script>
</head>
<body>
    
    <header class="main-header" style="border-bottom: 2px solid #000;">
        <div class="wide-container" style="display: flex; align-items: center; justify-content: space-between; width: 100%; height: 100%;">
            <a href="/index.html" class="logo" style="text-decoration: none;">
                <i class="fa-solid fa-cube"></i>
                <span>DearZit</span>
            </a>
            <nav class="main-nav">
                <ul>
                    <li><a href="/notice.html">공지사항</a></li>
                    <li><a href="/about.html">디어지트란?</a></li>
                    <li><a href="/agit.html">홈피들</a></li>
                    <li><a href="/community.html" class="active">소통게시판</a></li>
                    <li><a href="/support.html">고객지원</a></li>
                    <li class="nav-admin">
                        <a href="/admin.html" target="_blank" id="admin-link" style="text-decoration: none; color: #fff; border: none; padding: 8px 18px; border-radius: 6px; font-weight: 800; transition: 0.3s; background: #ff0000; display: inline-block;">관리자</a>
                    </li>
                </ul>
            </nav>
            <div id="auth-nav" class="auth-nav"></div>
        </div>
    </header>

    <div id="landing-wrapper"><main>
    <div class="community-container" style="padding: 80px 40px;">
        <header class="community-header">
            <div class="title-area">
                <h1 style="font-size: 4.5rem; font-weight: 900; letter-spacing: -3px;">소통게시판</h1>
                <p>당신의 아지트를 자랑하고 친구들과 이야기를 나누세요.</p>
            </div>
        </header>
        <div class="board-table-wrapper">
            <table class="board-table">
                <thead>
                    <tr>
                        <th class="col-id">번호</th>
                        <th class="col-title">제목</th>
                        <th class="col-author">작성자</th>
                        <th class="col-views">조회</th>
                        <th class="col-likes">추천</th>
                        <th class="col-date">날짜</th>
                    </tr>
                </thead>
                <tbody id="board-body">
                    <tr><td colspan="6" style="text-align:center; padding:100px;">데이터를 불러오는 중...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="board-footer" style="margin-top: 40px; display: flex; justify-content: flex-end;">
            <button class="btn-write" id="btn-write-main" style="padding: 18px 50px; border-radius: 12px; background: #000; color: #fff; border: none; font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: 0.3s;">새 글 쓰기</button>
        </div>
    </div>
    <script>
        async function loadPosts() {
            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/community/posts`);
                const result = await res.json();
                const tbody = document.getElementById('board-body');
                if(!Array.isArray(result) || result.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:100px; color:#94a3b8;">작성된 게시글이 없습니다.</td></tr>';
                    return;
                }
                tbody.innerHTML = result.map((post, index) => `
                    <tr onclick="location.href='/read.html?id=${post.id}'">
                        <td class="col-id">${result.length - index}</td>
                        <td class="col-title" style="text-align:left; padding-left:30px;">${post.title}</td>
                        <td class="col-author">${post.author_nickname || '익명'}</td>
                        <td class="col-views">${post.view_count || 0}</td>
                        <td class="col-likes">${post.like_count || 0}</td>
                        <td class="col-date">${post.created_at ? post.created_at.split('T')[0] : '-'}</td>
                    </tr>
                `).join('');
            } catch(err) { console.error(err); }
        }
        document.getElementById('btn-write-main').onclick = () => {
            if(!localStorage.getItem(CONFIG.USER_INFO_KEY)) {
                alert('로그인이 필요합니다.');
                location.href = '/login.html';
                return;
            }
            location.href='/write.html';
        };
        loadPosts();
    </script>
</main></div>
</body>
</html>
