<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홈 | DearZit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="landing.css">
    <link rel="stylesheet" href="modal.css">
    <style>
        body { background: #f8fafc; }
        
        .home-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 1. 광고 배너 스타일 */
        .hero-banner {
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4);
            border: 3px solid #000;
            border-radius: 20px;
            padding: 60px 40px;
            color: #fff;
            position: relative;
            overflow: hidden;
            box-shadow: 8px 8px 0 #000;
            margin-bottom: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 600px;
        }
        .hero-title {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 20px;
            line-height: 1.2;
            text-shadow: 2px 2px 0 #000;
        }
        .hero-desc {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 30px;
            opacity: 0.95;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
        }
        .hero-btn {
            background: #fff;
            color: #000;
            padding: 15px 30px;
            border: 2px solid #000;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 800;
            text-decoration: none;
            display: inline-block;
            box-shadow: 4px 4px 0 #000;
            transition: 0.2s;
        }
        .hero-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 #000;
            background: #ffde59;
        }
        .hero-icon {
            font-size: 12rem;
            color: rgba(255, 255, 255, 0.3);
            position: absolute;
            right: 40px;
            transform: rotate(-15deg);
            z-index: 1;
        }

        /* 2. 섹션 그리드 */
        .home-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
        }

        @media (max-width: 900px) {
            .home-grid {
                grid-template-columns: 1fr;
            }
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 25px;
            border-bottom: 3px solid #000;
            padding-bottom: 15px;
        }
        .section-title {
            font-size: 1.8rem;
            font-weight: 900;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title i {
            color: #8b5cf6;
        }
        .section-more {
            color: #64748b;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .section-more:hover { color: #000; }

        /* 3. 우체국 홈피 카드 */
        .hompy-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .hompy-card {
            background: #fff;
            border: 2px solid #000;
            border-radius: 16px;
            padding: 25px 20px;
            box-shadow: 4px 4px 0 #000;
            transition: 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .hompy-card:hover {
            transform: translateY(-5px);
            box-shadow: 6px 6px 0 #000;
            background: #f1f5f9;
        }
        .hompy-avatar {
            width: 70px;
            height: 70px;
            background: #fdf2f8;
            border: 2px solid #000;
            border-radius: 50%;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #db2777;
        }
        .hompy-name {
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }
        .hompy-bio {
            font-size: 0.85rem;
            color: #64748b;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        /* 4. 소통게시판 리스트 */
        .post-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .post-item {
            background: #fff;
            border: 2px solid #000;
            border-radius: 12px;
            padding: 18px;
            box-shadow: 3px 3px 0 #000;
            text-decoration: none;
            color: inherit;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .post-item:hover {
            transform: translateX(5px);
            background: #fffbeb;
        }
        .post-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            min-width: 0;
            padding-right: 15px;
        }
        .post-title {
            font-weight: 800;
            font-size: 1.05rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .post-meta {
            font-size: 0.8rem;
            color: #64748b;
            display: flex;
            gap: 15px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    
    <header class="main-header" style="border-bottom: 2px solid #000;">
        <div class="wide-container" style="display: flex; align-items: center; justify-content: space-between; width: 100%; height: 100%;">
            <a href="/index.html" class="logo" style="text-decoration: none;">
                <i class="fa-solid fa-cube"></i>
                <span>DearZit</span>
            </a>
            <nav class="main-nav">
                <ul>
                    <li><a href="/notice.html">공지사항</a></li>
                    <li><a href="/about.html">디어지트란?</a></li>
                    <li><a href="/agit.html">홈피들</a></li>
                    <li><a href="/community.html">소통게시판</a></li>
                    <li><a href="/support.html">고객지원</a></li>
                    <li class="nav-admin">
                        <a href="/admin.html" target="_blank" id="admin-link" style="text-decoration: none; color: #fff; border: none; padding: 8px 18px; border-radius: 6px; font-weight: 800; transition: 0.3s; background: #ff0000; display: inline-block;">관리자</a>
                    </li>
                </ul>
            </nav>
            <div id="auth-nav" class="auth-nav"></div>
        </div>
    </header>

    <div class="home-container">
        <!-- 1. 광고 배너 (Hero Section) -->
        <section class="hero-banner">
            <i class="fa-solid fa-envelope-open-text hero-icon"></i>
            <div class="hero-content">
                <h1 class="hero-title">당신의 이야기를 담는<br>나만의 AI 편지 공간</h1>
                <p class="hero-desc">DearZit 우체국에서 친구들과 특별한 편지를 주고받으세요.<br>AI가 당신만의 특별한 3D 아바타와 엽서를 만들어 드립니다!</p>
                <a href="/minihompy.html" class="hero-btn">내 홈피 만들기 <i class="fa-solid fa-arrow-right" style="margin-left: 5px;"></i></a>
            </div>
        </section>

        <!-- 하단 2단 그리드 (우체국 & 소통게시판) -->
        <div class="home-grid">
            <!-- 2. 우체국 홈피 목록 -->
            <section class="hompy-section">
                <div class="section-header">
                    <h2 class="section-title"><i class="fa-solid fa-signs-post"></i> 인기 우체국 둘러보기</h2>
                    <a href="/agit.html" class="section-more">전체보기 <i class="fa-solid fa-chevron-right"></i></a>
                </div>
                <div id="hompy-container" class="hompy-grid">
                    <!-- JS로 렌더링 -->
                    <div style="grid-column: 1/-1; text-align:center; padding: 40px; color: #94a3b8; font-weight:600;"><i class="fa-solid fa-spinner fa-spin"></i> 로딩 중...</div>
                </div>
            </section>

            <!-- 3. 소통게시판 목록 -->
            <section class="post-section">
                <div class="section-header">
                    <h2 class="section-title"><i class="fa-solid fa-comments"></i> 실시간 소통게시판</h2>
                    <a href="/community.html" class="section-more">더보기 <i class="fa-solid fa-chevron-right"></i></a>
                </div>
                <div id="recent-posts-container" class="post-list">
                    <!-- JS로 렌더링 -->
                    <div style="text-align:center; padding: 20px; color: #94a3b8; font-weight:600;"><i class="fa-solid fa-spinner fa-spin"></i> 로딩 중...</div>
                </div>
            </section>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadRecentPosts();
            loadRandomHompies();
        });

        async function loadRecentPosts() {
            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/community/posts`);
                const posts = await res.json();
                const container = document.getElementById('recent-posts-container');
                
                if (posts && posts.length > 0) {
                    const recent = posts.slice(0, 5); // 최근 5개 노출
                    container.innerHTML = recent.map(p => `
                        <a href="/read.html?id=${p.id}" class="post-item">
                            <div class="post-info">
                                <div class="post-title">${p.title}</div>
                                <div class="post-meta">
                                    <span><i class="fa-solid fa-user-pen"></i> ${p.author_nickname || '익명'}</span>
                                    <span><i class="fa-regular fa-clock"></i> ${p.created_at ? p.created_at.split('T')[0] : ''}</span>
                                </div>
                            </div>
                            <i class="fa-solid fa-chevron-right" style="color:#cbd5e1;"></i>
                        </a>
                    `).join('');
                } else {
                    container.innerHTML = '<div style="text-align:center; padding: 30px; color: #94a3b8; font-weight:600; border: 2px dashed #cbd5e1; border-radius: 12px; background: #fff;">아직 등록된 게시글이 없습니다.</div>';
                }
            } catch(e) {
                console.error('게시글 불러오기 실패:', e);
                const container = document.getElementById('recent-posts-container');
                if(container) container.innerHTML = '<div style="text-align:center; padding: 20px; color: #ef4444; font-weight:600;">데이터를 불러오지 못했습니다.</div>';
            }
        }

        async function loadRandomHompies() {
            try {
                // 전체공개로 설정된 미니홈피 목록 가져오기
                const res = await fetch(`${CONFIG.API_BASE_URL}/homepage/all`);
                const result = await res.json();
                const container = document.getElementById('hompy-container');
                
                if (result.status === 'success' && result.data && result.data.length > 0) {
                    // 홈피 목록 랜덤으로 섞기
                    const shuffled = result.data.sort(() => 0.5 - Math.random());
                    const selected = shuffled.slice(0, 6); // 최대 6명 노출
                    
                    container.innerHTML = selected.map(hp => `
                        <a href="/DearZit.html?member_id=${hp.member_id}" class="hompy-card">
                            <div class="hompy-avatar">
                                <i class="fa-solid fa-house-user"></i>
                            </div>
                            <div class="hompy-name">${hp.nickname || '익명'} 님의 홈피</div>
                            <div class="hompy-bio">${hp.title || '환영합니다! 제 미니홈피에 놀러오세요.'}</div>
                        </a>
                    `).join('');
                } else {
                    container.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding: 40px; color: #94a3b8; font-weight:600; border: 2px dashed #cbd5e1; border-radius: 16px; background: #fff;">아직 전체공개된 홈피가 없습니다.</div>';
                }
            } catch(e) {
                console.error('홈피 불러오기 실패:', e);
                const container = document.getElementById('hompy-container');
                if(container) container.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding: 20px; color: #ef4444; font-weight:600;">데이터를 불러오지 못했습니다.</div>';
            }
        }
    </script>
</body>
</html>
