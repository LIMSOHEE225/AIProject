<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우체국 | DearZit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="landing.css">
    
</head>
<body>
    
    <header class="main-header" style="border-bottom: 2px solid #000;">
        <div class="wide-container" style="display: flex; align-items: center; justify-content: space-between; width: 100%; height: 100%;">
            <a href="/index.html" class="logo" style="text-decoration: none;">
                <i class="fa-solid fa-cube"></i>
                <span>DearZit</span>
            </a>
            <nav class="main-nav">
                <ul>
                    <li><a href="/notice.html">공지사항</a></li>
                    <li><a href="/about.html">디어지트란?</a></li>
                    <li><a href="/agit.html" class="active">홈피들</a></li>
                    <li><a href="/community.html">소통게시판</a></li>
                    <li><a href="/support.html">고객지원</a></li>
                    <li class="nav-admin">
                        <a href="/admin.html" target="_blank" id="admin-link" style="text-decoration: none; color: #fff; border: none; padding: 8px 18px; border-radius: 6px; font-weight: 800; transition: 0.3s; background: #ff0000; display: inline-block;">관리자</a>
                    </li>
                </ul>
            </nav>
            <div id="auth-nav" class="auth-nav"></div>
        </div>
    </header>

    <div id="landing-wrapper"><main>
    <div class="community-container" style="padding: 60px 40px; max-width: 1200px; margin: 0 auto;">
        <h2 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 50px;">홈피목록 <span style="font-size:1.2rem; color:#64748b; font-weight:600; margin-left:10px;">(전체공개 홈피)</span></h2>
        <div id="agit-list-container" style="display: flex; flex-direction: column; gap: 15px;">
            <div style="text-align:center; padding:50px; color:#64748b; background:#fff; border-radius:15px; border:1px solid #e2e8f0;">홈피 목록을 불러오는 중...</div>
        </div>
    </div>
    <style>
        .agit-list-item:hover { border-color: #3b82f6 !important; background: #f8fafc !important; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.1) !important; }
        .btn-purple-hp { background: #3b82f6; color: #fff; border: none; font-weight: 700; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-purple-hp:hover { background: #2563eb; }
    </style>
</main></div>
    <script src="config.js"></script>
    <script src="common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('agit-list-container');
            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/homepage/all`);
                const result = await res.json();
                
                if (result.status === 'success' && result.data && result.data.length > 0) {
                    container.innerHTML = result.data.map(hp => {
                        const title = hp.title || '이름 없는 미니홈피';
                        const initial = title.substring(0, 1).toUpperCase();
                        
                        // 랜덤 배경색 배정
                        const colors = ['#7c3aed', '#10b981', '#f59e0b', '#ef4444', '#3b82f6', '#8b5cf6', '#ec4899'];
                        const colorIdx = [...title].reduce((acc, char) => acc + char.charCodeAt(0), 0) % colors.length;
                        const bgColor = colors[colorIdx];
                        
                        return `
                        <div class="agit-list-item" style="display: flex; align-items: center; background: #fff; padding: 18px 35px; border-radius: 15px; border: 1px solid #e2e8f0; box-shadow: 0 2px 8px rgba(0,0,0,0.02); transition: 0.2s;">
                            <div style="width: 50px; height: 50px; background: ${bgColor}; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.5rem; font-weight: 800; margin-right: 20px; flex-shrink: 0;">
                                ${initial}
                            </div>
                            <div style="flex: 1;">
                                <span style="font-weight: 800; font-size: 1.25rem; color:#1e293b;">${title}</span>
                                <span style="margin-left: 12px; font-size: 0.95rem; color: #64748b; font-weight: 600; padding: 4px 10px; background: #f1f5f9; border-radius: 6px;">${hp.nickname || '익명'}</span>
                            </div>
                            <button class="btn-purple-hp" style="padding: 12px 30px;" onclick="location.href='/minihompy.html?id=${hp.member_id}'">구경하기</button>
                        </div>
                        `;
                    }).join('');
                } else {
                    container.innerHTML = '<div style="text-align:center; padding:50px; color:#64748b; font-size:1.1rem; border:1px solid #e2e8f0; border-radius:15px; background:#fff;">현재 전체공개로 등록된 미니홈피가 없습니다.</div>';
                }
            } catch (e) {
                console.error(e);
                container.innerHTML = '<div style="text-align:center; padding:50px; color:#ef4444; font-size:1.1rem; border:1px solid #e2e8f0; border-radius:15px; background:#fff;">홈피 목록을 불러오는데 실패했습니다.</div>';
            }
        });
    </script>
</body>
</html>
