<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 | DearZit</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="landing.css">
</head>
<body>
    
    <header class="main-header" style="border-bottom: 2px solid #000;">
        <div class="wide-container" style="display: flex; align-items: center; justify-content: space-between; width: 100%; height: 100%;">
            <a href="/index.html" class="logo" style="text-decoration: none;">
                <i class="fa-solid fa-cube"></i>
                <span>DearZit</span>
            </a>
            <nav class="main-nav">
                <ul>
                    <li><a href="/notice.html">공지사항</a></li>
                    <li><a href="/about.html">디어지트란?</a></li>
                    <li><a href="/agit.html">홈피들</a></li>
                    <li><a href="/community.html">소통게시판</a></li>
                    <li><a href="/support.html">고객지원</a></li>
                    <li class="nav-admin">
                        <a href="/admin.html" target="_blank" id="admin-link" style="text-decoration: none; color: #fff; border: none; padding: 8px 18px; border-radius: 6px; font-weight: 800; transition: 0.3s; background: #ff0000; display: inline-block;">관리자</a>
                    </li>
                </ul>
            </nav>
            <div id="auth-nav" class="auth-nav"></div>
        </div>
    </header>

    <div class="wide-container" style="padding: 40px 20px;">
        <h1 style="font-size: 2rem; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px;">마이페이지</h1>
        
        <div style="background: #fff; border-radius: 12px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); max-width: 800px; margin: 0 auto; border: 2px solid #000;">
            <h2 style="font-size: 1.2rem; margin-bottom: 20px; color: var(--accent-primary, #6366f1);">계정 정보 수정</h2>
            <p style="color: #64748b; font-size: 0.95rem; margin-bottom: 30px;">비밀번호, 전화번호 등의 기본 정보를 수정할 수 있습니다.</p>
            
            <div style="display: flex; flex-direction: column; gap: 20px;">
                <div class="input-group">
                    <label style="font-weight: bold; margin-bottom: 8px; display: block;">이메일 (아이디)</label>
                    <input type="email" id="account-email" disabled style="width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 1rem; background: #f1f5f9; color: #64748b; cursor: not-allowed;" title="이메일은 변경할 수 없습니다.">
                </div>
                
                <div class="input-group">
                    <label style="font-weight: bold; margin-bottom: 8px; display: block;">비밀번호</label>
                    <button type="button" onclick="openPasswordModal()" style="padding: 12px 20px; background: #fff; border: 1px solid #ddd; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; color: #1e293b; width: fit-content;">비밀번호 변경</button>
                </div>
                
                <div class="input-group">
                    <label style="font-weight: bold; margin-bottom: 8px; display: block;">실명</label>
                    <input type="text" id="account-realname" disabled style="width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 1rem; background: #f1f5f9; color: #64748b; cursor: not-allowed;" title="실명은 변경할 수 없습니다.">
                </div>

                <div class="input-group">
                    <label style="font-weight: bold; margin-bottom: 8px; display: block;">닉네임</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="account-nickname" placeholder="닉네임을 입력해주세요" style="flex: 1; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 1rem;">
                        <button type="button" onclick="checkNickname()" id="btn-check-nick" style="padding: 12px 20px; background: #f1f5f9; border: 1px solid #ddd; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; color: #1e293b;">중복 확인</button>
                    </div>
                    <span id="nickname-msg" style="font-size: 0.85rem; display: none; margin-top: 5px;"></span>
                </div>

                <div class="input-group">
                    <label style="font-weight: bold; margin-bottom: 8px; display: block;">휴대폰 인증</label>
                    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <select id="account-telecom" style="width: 110px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 0.95rem;">
                            <option value="SKT">SKT</option>
                            <option value="KT">KT</option>
                            <option value="LG">LG U+</option>
                            <option value="ALTL">알뜰폰</option>
                        </select>
                        <input type="tel" id="account-phone" placeholder="010-0000-0000" style="flex: 1; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 1rem;">
                        <button type="button" onclick="sendVerification()" id="btn-send-verify" style="padding: 12px 15px; background: #1e293b; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; white-space: nowrap;">인증번호 받기</button>
                    </div>
                    <div id="verify-code-area" style="display: none; gap: 10px;">
                        <input type="text" id="verify-code" placeholder="인증번호 4자리 (테스트용: 1234)" maxlength="4" style="flex: 1; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 1rem;">
                        <button type="button" onclick="confirmVerification()" id="btn-confirm-verify" style="padding: 12px 20px; background: #22c55e; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; white-space: nowrap;">인증 확인</button>
                    </div>
                    <span id="phone-msg" style="font-size: 0.85rem; color: #22c55e; display: none; margin-top: 5px;">인증이 완료되었습니다.</span>
                </div>

                <div class="input-group">
                    <label style="font-weight: bold; margin-bottom: 8px; display: block;">생년월일</label>
                    <input type="date" id="account-birthdate" disabled style="width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 1rem; background: #f1f5f9; color: #64748b; cursor: not-allowed;" title="생년월일은 변경할 수 없습니다.">
                </div>

                <div class="input-group">
                    <label style="font-weight: bold; margin-bottom: 8px; display: block;">성별</label>
                    <select id="account-gender" disabled style="width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 1rem; background: #f1f5f9; color: #64748b; cursor: not-allowed;" title="성별은 변경할 수 없습니다.">
                        <option value="">선택 안함</option>
                        <option value="male">남성</option>
                        <option value="female">여성</option>
                    </select>
                </div>
                
                <div style="text-align: center; margin-top: 10px;">
                    <button id="btn-update-account" onclick="updateAccountInfo()" style="background: var(--accent-primary, #6366f1); color: #fff; border: none; padding: 15px 40px; border-radius: 8px; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(99,102,241,0.3);">
                        정보 수정하기
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="common.js"></script>
    <script src="account.js"></script>

    <!-- 비밀번호 변경 모달 -->
    <div id="pw-modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center;">
        <div style="background: #fff; padding: 30px; border-radius: 16px; width: 400px; max-width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
            <h3 style="margin-bottom: 20px; font-size: 1.3rem;">비밀번호 변경</h3>
            <div style="margin-bottom: 15px;">
                <label style="display: block; font-weight: 600; margin-bottom: 8px;">기존 비밀번호</label>
                <input type="password" id="modal-pw-current" placeholder="현재 비밀번호 입력" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display: block; font-weight: 600; margin-bottom: 8px;">새 비밀번호</label>
                <input type="password" id="modal-pw-new" placeholder="새 비밀번호 입력" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: 25px;">
                <label style="display: block; font-weight: 600; margin-bottom: 8px;">새 비밀번호 확인</label>
                <input type="password" id="modal-pw-confirm" placeholder="새 비밀번호 다시 입력" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
                <div id="modal-pw-msg" style="color: #ff4757; font-size: 0.85rem; margin-top: 5px; display: none;">비밀번호가 일치하지 않습니다.</div>
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button type="button" onclick="closePasswordModal()" style="padding: 12px 20px; background: #f1f5f9; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; color: #64748b;">취소</button>
                <button type="button" onclick="changePassword()" id="btn-change-pw" style="padding: 12px 20px; background: #6366f1; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; color: #fff;">변경하기</button>
            </div>
        </div>
    </div>
</body>
</html>
