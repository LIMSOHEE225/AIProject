<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고객지원 | DearZit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="landing.css">
    
</head>
<body>
    
    <header class="main-header" style="border-bottom: 2px solid #000;">
        <div class="wide-container" style="display: flex; align-items: center; justify-content: space-between; width: 100%; height: 100%;">
            <a href="/index.html" class="logo" style="text-decoration: none;">
                <i class="fa-solid fa-cube"></i>
                <span>DearZit</span>
            </a>
            <nav class="main-nav">
                <ul>
                    <li><a href="/notice.html">공지사항</a></li>
                    <li><a href="/about.html">디어지트란?</a></li>
                    <li><a href="/agit.html">홈피들</a></li>
                    <li><a href="/community.html">소통게시판</a></li>
                    <li><a href="/support.html" class="active">고객지원</a></li>
                    <li class="nav-admin">
                        <a href="/admin.html" target="_blank" id="admin-link" style="text-decoration: none; color: #fff; border: none; padding: 8px 18px; border-radius: 6px; font-weight: 800; transition: 0.3s; background: #ff0000; display: inline-block;">관리자</a>
                    </li>
                </ul>
            </nav>
            <div id="auth-nav" class="auth-nav"></div>
        </div>
    </header>

    <div class="wide-container" style="padding: 40px 20px;">
        <h1 style="font-size: 2rem; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px;">고객지원</h1>
        
        <div style="background: #fff; border-radius: 12px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); max-width: 800px; margin: 0 auto;">
            <h2 style="font-size: 1.2rem; margin-bottom: 20px; color: var(--accent-blue);">무엇을 도와드릴까요?</h2>
            
            <div style="display: flex; flex-direction: column; gap: 20px;">
                <div class="input-group">
                    <label style="font-weight: bold; margin-bottom: 8px; display: block;">발송인 메일 주소</label>
                    <input type="email" id="support-email" placeholder="답변을 받으실 이메일 주소를 입력해주세요" style="width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 1rem;">
                </div>
                
                <div class="input-group">
                    <label style="font-weight: bold; margin-bottom: 8px; display: block;">문의 제목</label>
                    <input type="text" id="support-title" placeholder="어떤 문제로 문의하시나요?" style="width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 1rem;">
                </div>
                
                <div class="input-group">
                    <label style="font-weight: bold; margin-bottom: 8px; display: block;">문의 내용</label>
                    <textarea id="support-content" placeholder="문의하실 내용을 자세히 적어주세요." style="width: 100%; height: 200px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; outline: none; resize: vertical; font-size: 1rem;"></textarea>
                </div>
                
                <div style="text-align: center; margin-top: 10px;">
                    <button id="btn-submit-support" onclick="submitSupport()" style="background: #3b82f6; color: #fff; border: none; padding: 15px 40px; border-radius: 8px; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(59,130,246,0.3);">
                        관리자에게 문의하기
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="common.js"></script>
    <script>
        // 현재 로그인된 유저가 있다면 이메일을 기본값으로 세팅
        document.addEventListener('DOMContentLoaded', () => {
            const userInfoStr = localStorage.getItem(CONFIG.USER_INFO_KEY);
            if (userInfoStr) {
                try {
                    const userInfo = JSON.parse(userInfoStr);
                    if (userInfo.email) {
                        document.getElementById('support-email').value = userInfo.email;
                    }
                } catch(e) {}
            }
        });

        async function submitSupport() {
            const email = document.getElementById('support-email').value.trim();
            const title = document.getElementById('support-title').value.trim();
            const content = document.getElementById('support-content').value.trim();
            
            if (!email) return alert('발송인 메일 주소를 입력해주세요.');
            if (!title) return alert('문의 제목을 입력해주세요.');
            if (!content) return alert('문의 내용을 입력해주세요.');
            
            const btn = document.getElementById('btn-submit-support');
            btn.disabled = true;
            btn.innerText = '발송 중...';
            
            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/support/contact`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: title,
                        content: content,
                        sender_email: email
                    })
                });
                
                const result = await res.json();
                
                if (res.ok && result.status === 'success') {
                    alert('관리자에게 성공적으로 문의가 접수되었습니다!\n빠른 시일 내에 답변드리겠습니다.');
                    document.getElementById('support-title').value = '';
                    document.getElementById('support-content').value = '';
                } else {
                    alert('문의 접수 중 오류가 발생했습니다.');
                }
            } catch (err) {
                console.error(err);
                alert('서버와 통신할 수 없습니다.');
            } finally {
                btn.disabled = false;
                btn.innerText = '관리자에게 문의하기';
            }
        }
    </script>
</body>
</html>
