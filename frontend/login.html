<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | DearZit</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Kakao JS SDK (v1 - popup login 지원) -->
    <script src="https://developers.kakao.com/sdk/js/kakao.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="landing.css">
    
    <link rel="icon" href="favicon.ico">
</head>
<body>
    
    <header class="main-header">
        <div class="wide-container" style="display: flex; align-items: center; justify-content: space-between; width: 100%; height: 100%;">
            <a href="/index.html" class="logo" style="text-decoration: none;">
                <i class="fa-solid fa-cube"></i>
                <span>DearZit</span>
            </a>
            <nav class="main-nav">
                <ul>
                    <li><a href="/notice.html">공지사항</a></li>
                    <li><a href="/about.html">디어지트란?</a></li>
                    <li><a href="/agit.html">홈피들</a></li>
                    <li><a href="/community.html">소통게시판</a></li>
                    <li><a href="/support.html">고객지원</a></li>
                    <li class="nav-admin">
                        <a href="/admin.html" target="_blank" id="admin-link" style="text-decoration: none; color: #fff; border: none; padding: 8px 18px; border-radius: 6px; font-weight: 800; transition: 0.3s; background: #ff0000; display: inline-block;">관리자</a>
                    </li>
                </ul>
            </nav>
            <div id="auth-nav" class="auth-nav"></div>
        </div>
    </header>


    <style>
        .login-social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: none;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            box-sizing: border-box;
            text-decoration: none;
        }
        .login-social-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        }
        .login-social-btn img { width: 22px; height: 22px; object-fit: contain; }
        .divider-line {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #cbd5e1;
            font-size: 0.8rem;
            margin: 22px 0;
        }
        .divider-line::before, .divider-line::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }
    </style>

    <div id="landing-wrapper">
        <main>
            <div style="max-width: 420px; margin: 70px auto; padding: 50px 44px; background: #fff; border-radius: 32px; box-shadow: 0 30px 80px rgba(0,0,0,0.07); border: 1px solid #f1f5f9;">

                <!-- 타이틀 -->
                <div style="text-align: center; margin-bottom: 32px;">
                    <i class="fa-solid fa-cube" style="font-size: 2rem; color: #7c3aed; margin-bottom: 10px; display: block;"></i>
                    <h2 style="font-size: 1.8rem; font-weight: 800; margin: 0;">로그인</h2>
                    <p style="color: #94a3b8; font-size: 0.88rem; margin-top: 6px;">DearZit에 오신 것을 환영합니다</p>
                </div>

                <!-- 이메일 로그인 폼 -->
                <form id="login-form" class="auth-form">
                    <div style="margin-bottom: 12px;">
                        <input type="email" id="email-input" placeholder="이메일" required
                            style="width: 100%; padding: 15px 18px; border-radius: 12px; border: 1.5px solid #e2e8f0; outline: none; background: #f8fafc; box-sizing: border-box; font-size: 0.95rem;">
                    </div>
                    <div style="margin-bottom: 22px; position: relative;">
                        <input type="password" id="password-input" placeholder="비밀번호" required
                            style="width: 100%; padding: 15px 50px 15px 18px; border-radius: 12px; border: 1.5px solid #e2e8f0; outline: none; background: #f8fafc; box-sizing: border-box; font-size: 0.95rem;">
                        <button type="button" id="toggle-pw-login"
                            onclick="togglePassword('password-input','toggle-pw-login')"
                            style="position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#94a3b8; font-size:1rem; padding:4px;">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                    <button type="submit" class="btn-cta" style="width: 100%; border: none; cursor: pointer; padding: 16px; border-radius: 12px; font-size: 1rem;">로그인</button>
                </form>

                <!-- 구분선 -->
                <div class="divider-line" style="margin-top: 24px;">또는 간편 로그인</div>

                <!-- 소셜 로그인 버튼 -->
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <!-- 구글 -->
                    <button type="button" class="login-social-btn" id="btn-google-login"
                        style="background: #fff; border: 1.5px solid #e2e8f0; color: #1e293b;"
                        onclick="loginWithGoogle()">
                        <svg width="22" height="22" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
                        구글로 계속하기
                    </button>

                    <!-- 카카오 -->
                    <button type="button" class="login-social-btn" id="btn-kakao-login"
                        style="background: #FEE500; color: #191919;"
                        onclick="alert('카카오 로그인은 서비스 배포 후 이용 가능합니다.')">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="#191919"><path d="M12 3C6.48 3 2 6.48 2 10.8c0 2.7 1.62 5.1 4.08 6.6l-1.02 3.78c-.06.24.18.42.36.3L9.9 18.9c.66.12 1.38.18 2.1.18 5.52 0 10-3.48 10-7.8S17.52 3 12 3z"/></svg>
                        카카오로 계속하기
                    </button>

                    <!-- 네이버 -->
                    <button type="button" class="login-social-btn" id="btn-naver-login"
                        style="background: #03C75A; color: #fff;"
                        onclick="loginWithNaver()">
                        <span style="font-size: 1.1rem; font-weight: 900; font-family: sans-serif; line-height:1;">N</span>
                        네이버로 계속하기
                    </button>
                </div>

                <!-- 회원가입 링크 -->
                <div style="text-align: center; margin-top: 24px; padding-top: 20px; border-top: 1px solid #f1f5f9;">
                    <span style="color: #94a3b8; font-size: 0.88rem;">아직 회원이 아니신가요?</span>
                    <a href="/signup.html" style="color: #7c3aed; font-weight: 800; font-size: 0.88rem; text-decoration: none; margin-left: 6px;">회원가입 →</a>
                </div>

            </div>
        </main>

        <footer class="landing-footer">
            <p>&copy; 2026 DearZit Project. All rights reserved.</p>
        </footer>
    </div>

    <script src="config.js"></script>
    <script src="common.js"></script>
    <script src="auth.js"></script>
    <script>
        // 비밀번호 표시/숨김 토글
        function togglePassword(inputId, btnId) {
            const input = document.getElementById(inputId);
            const icon = document.querySelector('#' + btnId + ' i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fa-regular fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fa-regular fa-eye';
            }
        }

        // 구글 로그인
        async function loginWithGoogle() {
            const btn = document.getElementById('btn-google-login');
            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerText = '연결 중...';

            // 취소/뒤로가기 시 버튼 복구
            function restoreBtn() {
                btn.disabled = false;
                btn.innerHTML = originalHTML;
                document.removeEventListener('visibilitychange', onVisible);
                window.removeEventListener('focus', onFocus);
            }
            function onVisible() { if (!document.hidden) setTimeout(restoreBtn, 500); }
            function onFocus() { setTimeout(restoreBtn, 500); }
            document.addEventListener('visibilitychange', onVisible);
            window.addEventListener('focus', onFocus);

            try {
                // Supabase 클라이언트를 여기서 초기화 (정의 오류 방지)
                const _sb = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
                const { error } = await _sb.auth.signInWithOAuth({
                    provider: 'google',
                    options: { redirectTo: 'http://localhost:3000/index.html' }
                });
                if (error) throw error;
            } catch (err) {
                alert('구글 로그인 오류: ' + err.message);
                restoreBtn();
            }
        }

        // 구글 로그인 후 콜백 처리 (index.html 도착 시 세션 저장)
        document.addEventListener('DOMContentLoaded', () => {
            // Kakao SDK 초기화
            if (typeof Kakao !== 'undefined' && !Kakao.isInitialized()) {
                Kakao.init('68be48254bd2af31d86fe25c83e1ce0c');
            }
            if (typeof supabase !== 'undefined' && typeof CONFIG !== 'undefined') {
                const _sb = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
                _sb.auth.onAuthStateChange((event, session) => {
                    if (event === 'SIGNED_IN' && session) {
                        localStorage.setItem(CONFIG.AUTH_TOKEN_KEY, session.access_token);
                        localStorage.setItem(CONFIG.USER_INFO_KEY, JSON.stringify(session.user));
                    }
                });
            }
        });

        // 카카오 로그인
        function loginWithKakao() {
            const btn = document.getElementById('btn-kakao-login');
            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerText = '연결 중...';

            if (typeof Kakao === 'undefined' || !Kakao.isInitialized()) {
                Kakao.init('68be48254bd2af31d86fe25c83e1ce0c');
            }

            Kakao.Auth.login({
                success: function(authObj) {
                    // 카카오 유저 정보 가져오기
                    Kakao.API.request({
                        url: '/v2/user/me',
                        success: function(res) {
                            const kakaoUser = {
                                id: 'kakao_' + res.id,
                                email: res.kakao_account?.email || '',
                                name: res.kakao_account?.profile?.nickname || '카카오 사용자',
                                provider: 'kakao',
                                avatar: res.kakao_account?.profile?.profile_image_url || ''
                            };
                            localStorage.setItem(CONFIG.USER_INFO_KEY, JSON.stringify(kakaoUser));
                            localStorage.setItem(CONFIG.AUTH_TOKEN_KEY, authObj.access_token);
                            alert('카카오 로그인 성공! 환영합니다, ' + kakaoUser.name + '님!');
                            window.location.href = '/index.html';
                        },
                        fail: function(err) {
                            console.error('카카오 유저 정보 오류:', err);
                            btn.disabled = false;
                            btn.innerHTML = originalHTML;
                        }
                    });
                },
                fail: function(err) {
                    console.error('카카오 로그인 실패:', err);
                    btn.disabled = false;
                    btn.innerHTML = originalHTML;
                }
            });
        }
        // 네이버 로그인
        function loginWithNaver() {
            const NAVER_CLIENT_ID = 'dNJ5VhMmt5_qzQgMmuRK';
            const REDIRECT_URI = encodeURIComponent('http://localhost:3000/naver-callback.html');
            const STATE = Math.random().toString(36).substr(2, 10);
            sessionStorage.setItem('naver_state', STATE);
            const naverAuthUrl = `https://nid.naver.com/oauth2.0/authorize?response_type=token&client_id=${NAVER_CLIENT_ID}&redirect_uri=${REDIRECT_URI}&state=${STATE}`;
            window.location.href = naverAuthUrl;
        }
    </script>
</body>
</html>
