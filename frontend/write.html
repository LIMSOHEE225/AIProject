<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새 게시글 작성 | DearZit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="landing.css">
    <link rel="stylesheet" href="community.css">\n
    <link rel="icon" href="favicon.ico">
</head>
<body>
    
    <header class="main-header">
        <div class="wide-container" style="display: flex; align-items: center; justify-content: space-between; width: 100%; height: 100%;">
            <a href="/index.html" class="logo" style="text-decoration: none;">
                <i class="fa-solid fa-cube"></i>
                <span>DearZit</span>
            </a>
            <nav class="main-nav">
                <ul>
                    <li><a href="/notice.html">공지사항</a></li>
                    <li><a href="/about.html">디어지트란?</a></li>
                    <li><a href="/agit.html">홈피들</a></li>
                    <li><a href="/community.html" class="active">소통게시판</a></li>
                    <li><a href="/support.html">고객지원</a></li>
                    <li class="nav-admin">
                        <a href="/admin.html" target="_blank" id="admin-link" style="text-decoration: none; color: #fff; border: none; padding: 8px 18px; border-radius: 6px; font-weight: 800; transition: 0.3s; background: #ff0000; display: inline-block;">관리자</a>
                    </li>
                </ul>
            </nav>
            <div id="auth-nav" class="auth-nav"></div>
        </div>
    </header>

    <div id="landing-wrapper">
        <main>
            <div class="community-container" style="max-width: 800px; margin: 60px auto;">
                <h2 style="font-size: 2.2rem; font-weight: 800; margin-bottom: 40px;">게시글 작성</h2>
                <div style="background: #fff; padding: 40px; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.05); border: 1px solid #f1f5f9;">
                    <form id="write-form">
                        <div style="margin-bottom: 20px;">
                            <label style="display: block; font-weight: 700; margin-bottom: 10px;">제목</label>
                            <input type="text" id="post-title" placeholder="제목을 입력하세요" required style="width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; outline: none; font-size: 1.1rem;">
                        </div>
                        <div style="margin-bottom: 30px;">
                            <label style="display: block; font-weight: 700; margin-bottom: 10px;">내용</label>
                            <textarea id="post-content" rows="15" placeholder="당신의 이야기를 들려주세요" required style="width: 100%; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; outline: none; font-family: inherit; font-size: 1rem; resize: vertical;"></textarea>
                        </div>
                        <div style="display: flex; gap: 15px; justify-content: flex-end;">
                            <button type="button" class="btn-secondary" onclick="history.back()" style="padding: 15px 30px; border-radius: 12px; border: 1px solid #ddd; background: #fff; cursor: pointer;">취소</button>
                            <button type="submit" class="btn-cta" style="padding: 15px 40px; border: none; cursor: pointer;">글 등록하기</button>
                        </div>
                    </form>
                </div>
            </div>
            <script>
                document.addEventListener('DOMContentLoaded', async () => {
                    if(!localStorage.getItem(CONFIG.USER_INFO_KEY)) {
                        alert('로그인이 필요합니다.');
                        location.href = '/login.html';
                        return;
                    }
                    
                    const params = new URLSearchParams(window.location.search);
                    const postId = params.get('id');
                    if (postId) {
                        document.querySelector('h2').innerText = '게시글 수정';
                        document.querySelector('button[type="submit"]').innerText = '글 수정하기';
                        
                        try {
                            const res = await fetch(`${CONFIG.API_BASE_URL}/community/posts/${postId}`);
                            const post = await res.json();
                            if (post) {
                                document.getElementById('post-title').value = post.title || '';
                                document.getElementById('post-content').value = post.content || '';
                            }
                        } catch(e) {
                            console.error('글 불러오기 실패:', e);
                        }
                    }
                });
                
                document.getElementById('write-form').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const userInfo = JSON.parse(localStorage.getItem(CONFIG.USER_INFO_KEY));
                    if(!userInfo) { alert('로그인이 필요합니다.'); return; }
                    
                    const nickname = userInfo.user_metadata?.nickname || userInfo.email.split('@')[0];
                    const params = new URLSearchParams(window.location.search);
                    const postId = params.get('id');
                    
                    const data = {
                        title: document.getElementById('post-title').value,
                        content: document.getElementById('post-content').value,
                        member_id: userInfo.id,
                        author_nickname: nickname
                    };
                    
                    try {
                        let res;
                        if (postId) {
                            res = await fetch(`${CONFIG.API_BASE_URL}/community/posts/${postId}`, {
                                method: 'PUT',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(data)
                            });
                        } else {
                            res = await fetch(`${CONFIG.API_BASE_URL}/community/posts`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(data)
                            });
                        }
                        
                        if(res.ok) { 
                            alert(postId ? '글이 수정되었습니다!' : '글이 등록되었습니다!'); 
                            location.href = postId ? `/read.html?id=${postId}` : '/community.html'; 
                        } else {
                            const result = await res.json();
                            alert('요청 처리 실패: ' + (result.detail || '알 수 없는 오류'));
                        }
                    } catch(err) { console.error(err); }
                });
            </script>
        </main>
        <footer class="landing-footer"><p>&copy; 2026 DearZit Project. All rights reserved.</p></footer>
    </div>
    <script src="config.js"></script>
    <script src="common.js"></script>
</body>
</html>
