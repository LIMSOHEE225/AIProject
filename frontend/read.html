<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 보기 | DearZit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="community.css">
</head>
<body>
    <header class="main-header" style="border-bottom: 2px solid #000;">
        <div class="wide-container" style="display: flex; align-items: center; justify-content: space-between; width: 100%; height: 100%;">
            <a href="/index.html" class="logo" style="text-decoration: none;">
                <i class="fa-solid fa-cube"></i>
                <span>DearZit</span>
            </a>
            <nav class="main-nav">
                <ul>
                    <li><a href="/notice.html">공지사항</a></li>
                    <li><a href="/about.html">디어지트란?</a></li>
                    <li><a href="/agit.html">홈피들</a></li>
                    <li><a href="/community.html" class="active">소통게시판</a></li>
                    <li><a href="/support.html">고객지원</a></li>
                    <li class="nav-admin">
                        <a href="/admin.html" target="_blank" id="admin-link" style="text-decoration: none; color: #fff; border: none; padding: 8px 18px; border-radius: 6px; font-weight: 800; transition: 0.3s; background: #ff0000; display: inline-block;">관리자</a>
                    </li>
                </ul>
            </nav>
            <div id="auth-nav" class="auth-nav"></div>
        </div>
    </header>

    <div class="community-container" style="max-width: 900px; margin: 60px auto;">
        <div id="post-detail-container">
            <div style="text-align: center; padding: 100px;"><i class="fa-solid fa-spinner fa-spin fa-2x"></i></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="common.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const postId = params.get('id');
        
        async function loadPost() {
            if(!postId) {
                document.getElementById('post-detail-container').innerHTML = '<div style="text-align:center; padding:100px;">잘못된 접근입니다.</div>';
                return;
            }

            try {
                // 조회수 증가
                await fetch(`${CONFIG.API_BASE_URL}/community/posts/${postId}/view`, { method: 'POST' });
                
                // 게시글 정보 가져오기
                const res = await fetch(`${CONFIG.API_BASE_URL}/community/posts/${postId}`);
                const post = await res.json();
                
                if(post && post.id) {
                    // 좋아요 상태 확인
                    let isLiked = false;
                    const userInfo = JSON.parse(localStorage.getItem(CONFIG.USER_INFO_KEY));
                    if(userInfo) {
                        const likeRes = await fetch(`${CONFIG.API_BASE_URL}/community/posts/${postId}/like-status?member_id=${userInfo.id}`);
                        const likeData = await likeRes.json();
                        isLiked = likeData.liked;
                    }
                    renderPost(post, isLiked);
                } else {
                    document.getElementById('post-detail-container').innerHTML = '<div style="text-align:center; padding:100px;">게시글을 찾을 수 없습니다.</div>';
                }
            } catch(err) { 
                console.error(err); 
                document.getElementById('post-detail-container').innerHTML = '<div style="text-align:center; padding:100px; color:red;">에러가 발생했습니다.</div>';
            }
        }
        
        function renderPost(post, isLiked) {
            const container = document.getElementById('post-detail-container');
            const heartClass = isLiked ? 'fa-solid fa-heart' : 'fa-regular fa-heart';
            const heartColor = isLiked ? '#ff0000' : '#000000';
            const btnText = '추천';
            
            // 본인 확인 로직
            const userInfo = JSON.parse(localStorage.getItem(CONFIG.USER_INFO_KEY));
            const isAuthor = userInfo && userInfo.id === post.member_id;
            
            container.innerHTML = `
                <div class="post-header" style="margin-bottom: 40px;">
                    <div style="margin-bottom: 25px;"><a href="/community.html" style="color: #000; text-decoration: none; font-weight: 800; font-size: 1rem;"><i class="fa-solid fa-arrow-left"></i> 목록으로</a></div>
                    <h1 style="font-size: 3.2rem; font-weight: 800; margin-bottom: 15px; letter-spacing: -2px;">${post.title}</h1>
                    
                    <div style="height: 3px; background: #000; width: 100%; margin-bottom: 20px;"></div>

                    <div style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 2px solid #000; color: #000;">
                        <div style="display: flex; align-items: center; gap: 20px; font-size: 1.2rem;">
                            <span style="font-weight: 800;">${post.author_nickname || '익명'}</span>
                            <span style="color: #666;">${post.created_at ? post.created_at.split('T')[0] : '-'}</span>
                        </div>
                        <div style="display: flex; gap: 25px; font-size: 1.2rem; font-weight: 600;">
                            <span><i class="fa-solid fa-eye"></i> ${post.view_count || 0}</span>
                            <span><i class="fa-solid fa-heart" style="color: #ff0000;"></i> ${post.like_count || 0}</span>
                        </div>
                    </div>
                </div>
                <div class="post-body" style="min-height: 450px; font-size: 1.25rem; line-height: 1.9; color: #000; margin-bottom: 80px; white-space: pre-wrap;">${post.content}</div>
                
                <div class="post-footer" style="display: flex; justify-content: center; gap: 20px; padding-top: 50px; border-top: 2px solid #000;">
                    <button id="btn-like-toggle" onclick="toggleLike()" style="padding: 18px 50px; border-radius: 12px; border: 2px solid #000; background: #fff; color: ${heartColor}; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px; font-size: 1.2rem; box-shadow: 4px 4px 0 #000;">
                        <i class="${heartClass}"></i>
                        <span>${btnText}</span>
                    </button>
                    
                    ${isAuthor ? `
                    <button id="btn-edit-post" onclick="location.href='/write.html?id=${postId}'" style="padding: 18px 50px; border-radius: 12px; border: 2px solid #3b82f6; background: #fff; color: #3b82f6; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px; font-size: 1.2rem; box-shadow: 4px 4px 0 #3b82f6;">
                        <i class="fa-solid fa-pen"></i>
                        <span>수정</span>
                    </button>
                    <button id="btn-delete-post" onclick="deletePost()" style="padding: 18px 50px; border-radius: 12px; border: 2px solid #ff0000; background: #fff; color: #ff0000; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px; font-size: 1.2rem; box-shadow: 4px 4px 0 #ff0000;">
                        <i class="fa-solid fa-trash-can"></i>
                        <span>삭제</span>
                    </button>
                    ` : ''}
                </div>
            `;
        }
        
        async function deletePost() {
            if(!confirm('정말로 이 게시글을 삭제하시겠습니까?')) return;
            
            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/community/posts/${postId}`, {
                    method: 'DELETE'
                });
                const result = await res.json();
                
                if(res.ok) {
                    alert('게시글이 삭제되었습니다.');
                    location.href = '/community.html';
                } else {
                    alert('삭제 실패: ' + (result.detail || '알 수 없는 오류'));
                }
            } catch(err) {
                console.error(err);
                alert('삭제 중 오류가 발생했습니다.');
            }
        }
        
        async function toggleLike() {
            const userInfo = JSON.parse(localStorage.getItem(CONFIG.USER_INFO_KEY));
            if(!userInfo) { alert('추천하시려면 먼저 로그인해 주세요.'); return; }
            
            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/community/posts/${postId}/like`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ member_id: userInfo.id })
                });
                const result = await res.json();
                if(result.status === 'success') {
                    loadPost(); 
                }
            } catch(err) { console.error(err); }
        }
        
        loadPost();
    </script>
</body>
</html>
